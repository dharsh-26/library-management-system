

<!DOCTYPE html>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">📚 LibraryMS</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="books.html">Books</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>

                    <li class="nav-item">
                        <button class="btn btn-light ms-2" id="logoutBtn">
                            Logout
                        </button>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Welcome -->
    <div class="container mt-5">
        <h2>Welcome, <span id="userName">User</span> 👋</h2>
        <p class="text-muted">Manage your library efficiently from your dashboard.</p>
    </div>

    <!-- Dashboard Cards -->
    <div class="container mt-4">
        <div class="row">

            <div class="col-md-4 mb-4">
                <div class="card shadow text-center p-4">
                    <h5>Total Books</h5>
                    <h2 id="totalBooks">0</h2>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card shadow text-center p-4">
                    <h5>Available Books</h5>
                    <h2 id="availableBooks">0</h2>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card shadow text-center p-4">
                    <h5>Issued Books</h5>
                    <h2 id="issuedBooks">0</h2>
                </div>
            </div>

        </div>
    </div>

    <!-- Quick Actions -->
    <div class="container text-center mt-4">

        <a href="books.html" class="btn btn-primary me-2">
            Manage Books
        </a>

        <a href="profile.html" class="btn btn-outline-primary">
            View Profile
        </a>

    </div>

    <!-- Bootstrap JS -->
