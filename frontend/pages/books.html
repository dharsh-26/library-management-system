


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books | Library Management System</title>
    <link rel="icon" href="3771417.png">


    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">📚 LibraryMS</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="books.html">Books</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Heading -->
    <div class="container mt-5">
        <h2 class="mb-4">Manage Books</h2>

        <!-- Add Book Form -->
        <div class="card shadow p-4 mb-5">
            <h4 class="mb-3">Add New Book</h4>

            <form id="bookForm">
                <input type="hidden" id="bookId">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Book Title</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Author</label>
                        <input type="text" id="author" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" id="category" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">ISBN</label>
                        <input type="text" id="isbn" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" id="quantity" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status</label>

                        <select id="status" class="form-select">
                            <option value="Available">Available</option>
                            <option value="Issued">Issued</option>
                        </select>
                    </div>

                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
    Add Book
</button>

<button type="button" class="btn btn-secondary ms-2" id="cancelBtn" style="display: none;">
    Cancel
</button>

            </form>
        </div>

        <!-- Book List -->
        <div class="card shadow p-4">
            <h4 class="mb-3">Library Books</h4>

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-primary">
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>ISBN</th>
                            <th>Quantity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="bookTableBody">
                        <!-- Books will appear here -->
                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Books JS -->
    <script src="../js/books.js"></script>

</body>
</html>
